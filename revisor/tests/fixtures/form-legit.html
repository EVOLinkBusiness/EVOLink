<!doctype html>
<html lang="es">
  <head>
    <title>Mudanzas Roy — Contacto</title>
  </head>
  <body>
    <nav>
      <!-- href="#" en el logo es un patrón legítimo habitual en previews (sin destino real aún) -->
      <a class="brand" href="#"><img src="logo.png" alt="Mudanzas Roy"> Mudanzas Roy</a>
    </nav>
    <h1>Solicita presupuesto</h1>
    <form>
      <label for="nombre">Nombre</label>
      <input id="nombre" type="text" placeholder="Tu nombre">
      <label for="detalle">Detalle del traslado</label>
      <textarea id="detalle" name="detalle" rows="4" placeholder="Origen, destino y fecha aproximada"></textarea>
      <button type="submit">Enviar</button>
    </form>
  </body>
</html>
